# Theme metadata
name = "custom"

[light]
  # top bar color
  primary = "#AE2012" # red

  # Menu bar color
  menu_primary = "#EAE2B7" # tan

  # Menu text color (not title on left)
  menu_text = "#000000" # black

  # Menu text color when selected
  menu_text_active = "#2A9D8F" # lighter blue

  # Menu text color of title on left   
  menu_title = "#000000" # black

  # Main page background color
  background = "#F7F7F7" # white

  # link color when not hovering over
  link = "#AE2012" # orange

  # link color when hovering over
  link_hover = "#EE9B00" # lighter orange


