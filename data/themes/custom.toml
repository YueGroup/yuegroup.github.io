# Theme metadata
name = "custom"

[light]
  # top bar color
  primary = "#005F73" # blue

  # Menu bar color
  menu_primary = "#E9D8A6" # tan

  # Menu text color (not title on left)
  menu_text = "#005F73" # blue

  # Menu text color when selected
  menu_text_active = "#0A9396" # lighter blue

  # Menu text color of title on left   
  menu_title = "#9B2226" # dark red

  # Main page background color
  background = "#E9D8A6" # tan

  #home_section_odd = ""
  #home_section_even = ""

  # link color when not hovering over
  link = "#BB3E03" # orange

  # link color when hovering over
  link_hover = "#CA6702" # lighter orange


[dark]
  # Primary
  primary = "#403d39"

  link = "#EE9B00"
  link_hover = "#CA6702"

