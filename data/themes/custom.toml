# Theme metadata
name = "custom"

[light]
  # top bar color
  primary = "#EF476F"

  # Menu bar color
  menu_primary = "#F7F7F7" # white

  # Menu text color (not title on left)
  menu_text = "#FCA311"

  # Menu text color when selected
  menu_text_active = "#0EAD69"

  # Menu text color of title on left   
  menu_title = "#118AB2"

  # Main page background color
  background = "#F7F7F7"

  home_section_odd = "#233D4D"
  home_section_even = "#A1C181"

  # link color when not hovering over
  link = "#D90429"

  # link color when hovering over
  link_hover = "#118AB2"


